<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>MBS — 5 User Flows</title>
<style>
:root{--bg:#0d1424;--panel:#16213c;--line:#28385c;--ink:#e9eefb;--mut:#9fb2d6;--acc:#5b9bd5;--game:#2a3656;}
*{box-sizing:border-box;font-family:Segoe UI,Roboto,Arial,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink)}
header{padding:14px 20px;background:#0a1120;border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:17px;font-weight:800}header h1 span{color:var(--acc)}
.wrap{max-width:1080px;margin:0 auto;padding:18px 20px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:9px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);cursor:pointer;font-size:13px}
.chip.on{background:var(--acc);border-color:var(--acc);color:#06122a;font-weight:700}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.m{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px}
.m .l{font-size:12px;color:var(--mut)}.m .v{font-size:22px;font-weight:700;margin-top:3px}
.phase{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line)}
.pname{flex:0 0 150px;color:var(--mut);font-size:13px;padding-top:4px}
.blocks{flex:1;display:flex;gap:9px;flex-wrap:wrap}
.blk{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--panel);min-width:120px;cursor:pointer}
.blk.game{background:var(--game);border-style:dashed}
.blk .bn{font-size:13px}.blk .bt{font-size:11px;color:var(--mut);margin-top:3px}
.note{margin:2px 0 6px 164px;font-size:12px;color:var(--mut)}
.adapt{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
.adapt h3{margin:0 0 8px;font-size:14px;color:var(--acc)}
.arow{display:flex;gap:10px;padding:5px 0;font-size:13px;border-top:1px solid var(--line)}
.arow .k{flex:0 0 170px;color:var(--mut)}
#panel{position:fixed;right:0;top:0;bottom:0;width:360px;background:#101a30;border-left:1px solid var(--line);padding:16px;overflow:auto;transform:translateX(100%);transition:.2s}
#panel.open{transform:none}#panel .x{float:right;cursor:pointer;color:var(--mut)}
#panel h4{margin:0 0 8px;font-size:14px}.it{border-top:1px solid var(--line);padding:8px 0;font-size:12.5px}
.it .id{color:var(--acc);font-weight:700}.it .ty{color:var(--mut);font-size:11px}
.ribbon{display:flex;gap:4px;margin-bottom:14px;font-size:11px;color:var(--mut)}
.ribbon div{flex:1;text-align:center;padding:6px 4px;background:var(--panel);border:1px solid var(--line);border-radius:7px}
</style></head><body>
